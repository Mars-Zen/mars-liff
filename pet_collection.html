<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>我的星獸</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f3f2f7;
      --card:      #ffffff;
      --border:    #e5e3ec;
      --text:      #1c1a2e;
      --subtext:   #6b7280;
      --muted:     #9ca3af;
      --primary:   #7c3aed;
      --pri-bg:    #ede9fe;
      --pri-text:  #5b21b6;
      --success:   #059669;
      --danger:    #dc2626;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.04);
      --shadow:    0 2px 8px rgba(0,0,0,0.08);
    }

    body {
      font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      padding-bottom: 40px;
    }

    /* ── HEADER ── */
    header {
      position: sticky; top: 0; z-index: 100;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      display: flex; align-items: center; gap: 12px;
    }
    .back-btn {
      width: 36px; height: 36px; border-radius: 10px;
      background: var(--bg); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0; font-size: 18px; line-height: 1;
      transition: background 0.15s; user-select: none;
    }
    .back-btn:active { background: var(--border); }
    .header-info { flex: 1; }
    .header-title { font-size: 17px; font-weight: 700; }
    .header-sub   { font-size: 12px; color: var(--subtext); margin-top: 1px; }

    /* ── LOADING ── */
    .loading { display: flex; justify-content: center; padding: 60px; }
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── MAIN CONTAINER ── */
    .container { padding: 16px; }

    /* ── SPECIES SECTION ── */
    .species-section {
      margin-bottom: 14px;
      background: var(--card);
      border-radius: 16px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }
    .species-header {
      display: flex; align-items: center; gap: 8px;
      padding: 13px 16px 8px;
    }
    .species-emoji { font-size: 18px; flex-shrink: 0; }
    .species-name  { font-size: 15px; font-weight: 700; }
    .species-count {
      margin-left: auto;
      font-size: 11px; color: var(--subtext);
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 20px; padding: 2px 8px;
    }

    /* ── PET ROW (3-column grid) ── */
    .pet-row {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 10px; padding: 4px 16px 14px;
    }

    /* ── CAROUSEL (4+ pets) ── */
    .pet-carousel {
      display: flex; align-items: center;
      padding: 4px 8px 14px; gap: 4px;
    }
    .pet-carousel .pet-row {
      flex: 1; padding: 0;
    }
    .carousel-arrow {
      flex-shrink: 0; width: 28px; height: 28px;
      border-radius: 50%; border: 1.5px solid var(--border);
      background: var(--card); color: var(--primary);
      font-size: 20px; line-height: 1; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.12s;
    }
    .carousel-arrow:disabled { opacity: 0.18; cursor: default; }
    .carousel-arrow:not(:disabled):active { background: var(--pri-bg); }

    /* ── PET CARD ── */
    .pet-card {
      width: 100%;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 10px 8px;
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .pet-card.is-active {
      border-color: var(--primary);
      background: #f5f3ff;
      box-shadow: 0 2px 12px rgba(124,58,237,0.15);
    }

    .pet-img-wrap {
      position: relative;
      width: 80px; height: 80px;
      border-radius: 12px; overflow: hidden;
      background: #ece8f5;
      display: flex; align-items: center; justify-content: center;
    }
    .pet-img-wrap img {
      width: 100%; height: 100%; object-fit: cover; display: block;
    }
    .pet-img-placeholder { font-size: 34px; }

    .pet-slot-num {
      align-self: flex-start;
      font-size: 9px; font-weight: 700; line-height: 1;
      background: #dc2626; color: #fff;
      border-radius: 5px; padding: 2px 6px;
      pointer-events: none;
    }

    .stage-badge {
      position: absolute; bottom: 4px; right: 4px;
      font-size: 9px; font-weight: 700;
      border-radius: 6px; padding: 2px 5px; line-height: 1;
    }
    .stage-1 { background: #00b894; color: #fff; }
    .stage-2 { background: #0984e3; color: #fff; }
    .stage-3 { background: #b2bec3; color: #374151; }
    .stage-4 { background: #fdcb6e; color: #78350f; }

    .pet-aura {
      font-size: 12px; color: var(--subtext); text-align: center;
      display: flex; align-items: center; justify-content: center; gap: 5px;
    }
    .pet-aura strong { color: var(--text); font-weight: 700; }
    .aura-stage-badge {
      font-size: 9px; font-weight: 700; padding: 1px 5px;
      border-radius: 4px; white-space: nowrap;
    }

    .active-badge {
      font-size: 11px; font-weight: 700; color: #fff;
      background: var(--primary); border: 1.5px solid var(--primary);
      border-radius: 20px; padding: 3px 10px;
      white-space: nowrap;
    }
    .set-active-btn {
      width: 100%; padding: 5px 0;
      border: 1px solid var(--primary); border-radius: 8px;
      background: transparent; color: var(--primary);
      font-size: 11px; font-weight: 700; cursor: pointer;
      font-family: 'Noto Sans TC', sans-serif;
      transition: background 0.12s;
    }
    .set-active-btn:active { background: var(--pri-bg); }
    .set-active-btn:disabled { opacity: 0.4; cursor: default; }

    /* ── UNKNOWN CARD (未收集) ── */
    .pet-card.unknown {
      border-style: dashed; border-color: #c4b5fd;
      background: #faf5ff; cursor: default;
    }
    .unknown-q {
      font-size: 36px; color: #c4b5fd; font-weight: 700; line-height: 80px;
    }
    .unknown-text { font-size: 11px; color: #c4b5fd; font-weight: 500; }

    /* ── UNLOCK SECTION ── */
    .unlock-section { margin-top: 6px; }

    .unlock-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 16px;
      padding: 18px 16px;
      display: flex; align-items: center; gap: 14px;
      box-shadow: var(--shadow-sm);
    }
    .unlock-card.locked { opacity: 0.65; }
    .unlock-card.unlockable {
      border-color: var(--primary);
      background: linear-gradient(135deg, #f5f3ff 0%, #ede9fe 100%);
      cursor: pointer;
      animation: glow 2.2s ease-in-out infinite;
    }
    .unlock-card.unlockable:active { opacity: 0.85; transform: scale(0.99); }
    @keyframes glow {
      0%, 100% { box-shadow: 0 4px 16px rgba(124,58,237,0.18); }
      50%       { box-shadow: 0 4px 28px rgba(124,58,237,0.38); }
    }

    .unlock-icon { font-size: 30px; flex-shrink: 0; }
    .unlock-info { flex: 1; min-width: 0; }
    .unlock-title {
      font-size: 15px; font-weight: 700; margin-bottom: 3px;
    }
    .unlock-card.unlockable .unlock-title { color: var(--primary); }
    .unlock-desc { font-size: 12px; color: var(--subtext); line-height: 1.5; }
    .unlock-arrow { font-size: 20px; color: var(--primary); flex-shrink: 0; }

    /* ── CONFIRM OVERLAY ── */
    .confirm-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 400;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; visibility: hidden;
      transition: opacity 0.2s, visibility 0.2s;
    }
    .confirm-overlay.open { opacity: 1; visibility: visible; }
    .confirm-box {
      background: var(--card); border-radius: 16px;
      padding: 24px 20px 20px; width: 88%; max-width: 320px;
      transform: scale(0.94);
      transition: transform 0.2s cubic-bezier(0.32,0.72,0,1);
    }
    .confirm-overlay.open .confirm-box { transform: scale(1); }
    .confirm-title  { font-size: 16px; font-weight: 700; color: var(--primary); margin-bottom: 10px; }
    .confirm-desc   { font-size: 13px; color: var(--subtext); line-height: 1.65; margin-bottom: 20px; }
    .confirm-btns   { display: flex; gap: 10px; }
    .confirm-btn {
      flex: 1; padding: 12px 0; border-radius: 10px; border: none;
      font-size: 14px; font-weight: 700; cursor: pointer;
      font-family: 'Noto Sans TC', sans-serif;
      transition: opacity 0.15s;
    }
    .confirm-btn:active   { opacity: 0.75; }
    .confirm-btn:disabled { opacity: 0.4; cursor: default; }
    .confirm-btn.cancel { background: var(--bg); border: 1px solid var(--border); color: var(--text); }
    .confirm-btn.summon { background: var(--primary); color: #fff; }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 32px; left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: #1c1a2e; color: #fff;
      border-radius: 10px; padding: 10px 18px;
      font-size: 13px; white-space: nowrap;
      opacity: 0; transition: all 0.22s;
      z-index: 1000; pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.ok   { background: var(--success); }
    .toast.err  { background: var(--danger); }
  </style>
</head>
<body>

<header>
  <button class="back-btn" onclick="goBack()">&#8592;</button>
  <div class="header-info">
    <div class="header-title">我的星獸</div>
    <div class="header-sub" id="headerSub">載入中...</div>
  </div>
</header>

<main class="container">
  <div id="collectionContent">
    <div class="loading"><div class="spinner"></div></div>
  </div>
</main>

<!-- 解鎖確認 Dialog -->
<div class="confirm-overlay" id="unlockOverlay" onclick="if(event.target===this)closeUnlock()">
  <div class="confirm-box">
    <div class="confirm-title">✨ 召喚新星獸</div>
    <div class="confirm-desc">馬爾斯將為你召喚全新星獸，需要一點時間生成。確認後可回到聊天室，完成時會推播通知。</div>
    <div class="confirm-btns">
      <button class="confirm-btn cancel" onclick="closeUnlock()">取消</button>
      <button class="confirm-btn summon" id="summonBtn" onclick="confirmUnlock()">確認召喚</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script>
  const API     = 'https://mars-magicapp.com/webhook';
  const LIFF_ID = '2009047186-MXDITyXh';

  const SPECIES_ORDER = [
    { key: 'Dragon',  label: '龍',    emoji: '🐉' },
    { key: 'Phoenix', label: '鳳凰',  emoji: '🐦‍🔥' },
    { key: 'Fox',     label: '狐',    emoji: '🦊' },
    { key: 'Wolf',    label: '狼',    emoji: '🐺' },
    { key: 'Unicorn', label: '獨角獸', emoji: '🦄' },
    { key: 'Eagle',   label: '鷹',    emoji: '🦅' },
    { key: 'Tiger',   label: '虎',    emoji: '🐯' },
    { key: 'Ghost',   label: '幽靈',  emoji: '👻' },
  ];

  const STAGE_NAMES = { 1: '誕生', 2: '幼年', 3: '覺醒', 4: '星神' };

  let uid = '', group_id = '', group_name = '';
  let summoningNewPet = false;
  const speciesPages = {};

  function changePage(key, newPage) {
    speciesPages[key] = newPage;
    renderCollection();
  }
  let collectionData = null;
  let activeSlot = 1;

  const _up = new URLSearchParams(location.search);
  group_id   = _up.get('group_id')   || '';
  group_name = _up.get('group_name') || '星際群組';

  async function init() {
    try {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) { liff.login(); return; }
      const p = await liff.getProfile();
      uid = p.userId;
    } catch {
      uid = _up.get('uid') || 'demo_user';
    }
    await loadCollection();
  }

  async function loadCollection() {
    try {
      const r = await fetch(`${API}/pet-collection`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ uid })
      });
      collectionData = await r.json();
      if (!collectionData.success) throw new Error();
      activeSlot = collectionData.active_pet_slot || 1;
      renderCollection();
    } catch {
      document.getElementById('collectionContent').innerHTML =
        '<div style="padding:48px;text-align:center;color:var(--muted);font-size:14px">載入失敗，請關閉後重試</div>';
      document.getElementById('headerSub').textContent = '';
    }
  }

  function petImageUrl(pet) {
    const raw = (pet.pet_gcs_path || '').replace(/\/?$/, '/');
    if (!raw || raw === '/') return null;
    return `${API}/get-signed-url?path=${encodeURIComponent(raw + 'stage_' + pet.pet_stage + '.png')}&v=${Math.floor(Date.now() / 1800000)}`;
  }

  function renderCollection() {
    const pets = collectionData.pets || [];
    let html = '';

    for (const sp of SPECIES_ORDER) {
      const spPets = pets.filter(p => p.pet_species === sp.key);
      let cardsHTML = '';

      let rowHTML = '';

      if (spPets.length === 0) {
        cardsHTML = `
          <div class="pet-card unknown">
            <div class="pet-img-wrap">
              <span class="unknown-q">?</span>
            </div>
            <div class="unknown-text">尚未收集</div>
          </div>`;
        rowHTML = `<div class="pet-row">${cardsHTML}</div>`;
      } else {
        const page       = speciesPages[sp.key] || 0;
        const pageSize   = 3;
        const totalPages = Math.ceil(spPets.length / pageSize);
        const pagePets   = spPets.slice(page * pageSize, (page + 1) * pageSize);

        for (const pet of pagePets) {
          const imgUrl  = petImageUrl(pet);
          const isActive = pet.pet_slot === activeSlot;
          const stage   = pet.pet_stage || 1;
          const imgTag  = imgUrl
            ? `<img src="${imgUrl}" alt="${sp.label}" onerror="this.outerHTML='<div class=\\'pet-img-placeholder\\'>${sp.emoji}</div>'">`
            : `<div class="pet-img-placeholder">${sp.emoji}</div>`;
          const actionHTML = isActive
            ? `<div class="active-badge">✦ 主獸</div>`
            : `<button class="set-active-btn" onclick="setActive(${pet.pet_slot})">設為主獸</button>`;

          cardsHTML += `
            <div class="pet-card ${isActive ? 'is-active' : ''}" id="pc-${pet.pet_slot}">
              <div class="pet-slot-num">${pet.pet_slot}</div>
              <div class="pet-img-wrap">
                ${imgTag}
              </div>
              <div class="pet-aura">
                <span class="aura-stage-badge stage-${stage}">${STAGE_NAMES[stage] || '誕生'}</span>
                <strong>${Number(pet.aura_points).toLocaleString()}</strong>
              </div>
              ${actionHTML}
            </div>`;
        }

        if (totalPages <= 1) {
          rowHTML = `<div class="pet-row">${cardsHTML}</div>`;
        } else {
          const prevDisabled = page === 0 ? 'disabled' : '';
          const nextDisabled = page >= totalPages - 1 ? 'disabled' : '';
          rowHTML = `
            <div class="pet-carousel">
              <button class="carousel-arrow" onclick="changePage('${sp.key}',${page - 1})" ${prevDisabled}>&#8249;</button>
              <div class="pet-row">${cardsHTML}</div>
              <button class="carousel-arrow" onclick="changePage('${sp.key}',${page + 1})" ${nextDisabled}>&#8250;</button>
            </div>`;
        }
      }

      const countBadge = spPets.length > 0
        ? `<span class="species-count">${spPets.length} 隻</span>` : '';

      html += `
        <div class="species-section">
          <div class="species-header">
            <span class="species-emoji">${sp.emoji}</span>
            <span class="species-name">${sp.label}</span>
            ${countBadge}
          </div>
          ${rowHTML}
        </div>`;
    }

    // 解鎖區塊
    const nextSlot  = collectionData.next_slot || (pets.length + 1);
    const canUnlock = collectionData.can_unlock_next;
    html += `
      <div class="unlock-section">
        <div class="unlock-card ${canUnlock ? 'unlockable' : 'locked'}"
             ${canUnlock ? 'onclick="openUnlock()"' : ''}>
          <div class="unlock-icon">${canUnlock ? '✨' : '🔒'}</div>
          <div class="unlock-info">
            <div class="unlock-title">${canUnlock ? '召喚新星獸' : `第 ${nextSlot} 隻星獸`}</div>
            <div class="unlock-desc">${canUnlock
              ? `點此召喚你的第 ${nextSlot} 隻星獸！`
              : `需要第 ${nextSlot - 1} 隻達到滿階（星神）才可解鎖`}</div>
          </div>
          ${canUnlock ? '<div class="unlock-arrow">›</div>' : ''}
        </div>
      </div>`;

    document.getElementById('headerSub').textContent = `共 ${pets.length} 隻`;
    document.getElementById('collectionContent').innerHTML = html;
  }

  async function setActive(slot) {
    const card = document.getElementById(`pc-${slot}`);
    const btn  = card ? card.querySelector('.set-active-btn') : null;
    if (btn) { btn.disabled = true; btn.textContent = '設定中...'; }

    try {
      const r = await fetch(`${API}/set-active-pet`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ uid, pet_slot: slot })
      });
      const d = await r.json();
      if (!d.success) throw new Error(d.message);

      activeSlot = slot;
      collectionData.active_pet_slot = slot;
      renderCollection();
      showToast('主獸已更新！', 'ok');
    } catch {
      if (btn) { btn.disabled = false; btn.textContent = '設為主獸'; }
      showToast('設定失敗，請重試', 'err');
    }
  }

  function openUnlock() {
    const btn = document.getElementById('summonBtn');
    btn.disabled = false;
    btn.textContent = '確認召喚';
    document.getElementById('unlockOverlay').classList.add('open');
  }
  function closeUnlock() {
    document.getElementById('unlockOverlay').classList.remove('open');
  }

  async function confirmUnlock() {
    const btn = document.getElementById('summonBtn');
    btn.disabled = true; btn.textContent = '召喚中...';

    try {
      const r = await fetch(`${API}/unlock-new-pet`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ uid })
      });
      const d = await r.json();
      if (!d.success) throw new Error(d.message);

      closeUnlock();
      showToast('召喚已啟動！完成後將推播通知', 'ok');

      summoningNewPet = true;

      // 將解鎖按鈕改成「召喚中」狀態
      setTimeout(() => {
        const card = document.querySelector('.unlock-card.unlockable');
        if (!card) return;
        card.classList.replace('unlockable', 'locked');
        card.removeAttribute('onclick');
        card.querySelector('.unlock-icon').textContent = '⏳';
        card.querySelector('.unlock-title').textContent = '召喚中...';
        card.querySelector('.unlock-desc').textContent = '完成後推播通知，回到此頁面將自動更新';
        const arrow = card.querySelector('.unlock-arrow');
        if (arrow) arrow.remove();
      }, 300);
    } catch (e) {
      btn.disabled = false; btn.textContent = '確認召喚';
      showToast(e.message || '召喚失敗，請重試', 'err');
    }
  }

  function goBack() {
    if (group_id) {
      const p = new URLSearchParams({ group_id, uid, group_name });
      location.href = `group_room.html?${p}`;
    } else {
      location.href = 'group_home.html';
    }
  }

  function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${type} show`;
    setTimeout(() => { t.className = 'toast'; }, 2500);
  }

  document.addEventListener('visibilitychange', () => {
    if (!document.hidden && summoningNewPet) {
      summoningNewPet = false;
      loadCollection();
    }
  });

  init();
</script>
</body>
</html>
