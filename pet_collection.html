<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>星獸收集</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f3f2f7;
      --card:      #ffffff;
      --border:    #e5e3ec;
      --text:      #1c1a2e;
      --subtext:   #6b7280;
      --muted:     #9ca3af;
      --primary:   #7c3aed;
      --pri-bg:    #ede9fe;
      --pri-text:  #5b21b6;
      --success:   #059669;
      --danger:    #dc2626;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.04);
      --shadow:    0 2px 8px rgba(0,0,0,0.08);
    }

    body {
      font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      padding-bottom: 40px;
    }

    /* ── HEADER ── */
    header {
      position: sticky; top: 0; z-index: 100;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      display: flex; align-items: center; gap: 12px;
    }
    .back-btn {
      width: 36px; height: 36px; border-radius: 10px;
      background: var(--bg); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0; font-size: 18px; line-height: 1;
      transition: background 0.15s; user-select: none;
    }
    .back-btn:active { background: var(--border); }
    .header-info { flex: 1; }
    .header-title { font-size: 17px; font-weight: 700; }
    .header-sub   { font-size: 12px; color: var(--subtext); margin-top: 1px; }

    /* ── LOADING ── */
    .loading { display: flex; justify-content: center; padding: 60px; }
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── MAIN CONTAINER ── */
    .container { padding: 16px; }

    /* ── SPECIES SECTION ── */
    .species-section {
      position: relative;
      margin-bottom: 14px;
      background: var(--card);
      border-radius: 16px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }
    .species-header {
      display: flex; align-items: center; gap: 8px;
      padding: 13px 16px 8px;
    }
    .species-emoji { font-size: 18px; flex-shrink: 0; }
    .species-name  { font-size: 15px; font-weight: 700; }
    .species-count {
      margin-left: auto;
      font-size: 11px; color: var(--subtext);
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 20px; padding: 2px 8px;
    }

    /* ── PET ROW (3-column grid) ── */
    .pet-row {
      display: grid; grid-template-columns: repeat(3, minmax(0, 116px));
      gap: 10px; padding: 4px 16px 14px;
      justify-content: center;
    }

    /* ── SCROLL ROW (4+ pets) ── */
    .pet-scroll-row {
      display: flex;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-x: contain;
      scrollbar-width: none;
    }
    .pet-scroll-row::-webkit-scrollbar { display: none; }
    .pet-scroll-page {
      flex: 0 0 100%;
      display: grid; grid-template-columns: repeat(3, minmax(0, 116px));
      gap: 10px; padding: 4px 16px 14px;
      justify-content: center;
      scroll-snap-align: start;
    }

    /* ── PET CARD ── */
    .pet-card {
      width: 100%;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 10px 8px;
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .pet-card.is-active {
      border-color: var(--primary);
      background: #f5f3ff;
      box-shadow: 0 2px 12px rgba(124,58,237,0.15);
    }

    .pet-img-wrap {
      position: relative;
      width: 80px; height: 80px;
      border-radius: 12px; overflow: hidden;
      background: #ece8f5;
      display: flex; align-items: center; justify-content: center;
    }
    .pet-img-wrap.is-loading { animation: imgPulse 1.6s ease-in-out infinite; }
    .pet-img-wrap.loaded { animation: none; }
    @keyframes imgPulse {
      0%, 100% { background: #ece8f5; }
      50%       { background: #d4c8f0; }
    }
    .pet-img-wrap img {
      width: 100%; height: 100%; object-fit: cover; display: block;
      -webkit-touch-callout: none;
      user-select: none;
      pointer-events: none;
    }
    .pet-img-placeholder { font-size: 34px; }

    .stage-badge {
      position: absolute; bottom: 4px; right: 4px;
      font-size: 9px; font-weight: 700;
      border-radius: 6px; padding: 2px 5px; line-height: 1;
    }
    .stage-1 { background: #00b894; color: #fff; }
    .stage-2 { background: #0984e3; color: #fff; }
    .stage-3 { background: #b2bec3; color: #374151; }
    .stage-4 { background: #fdcb6e; color: #78350f; }

    .pet-aura {
      font-size: 12px; color: var(--subtext); text-align: center;
      display: flex; align-items: center; justify-content: center; gap: 4px;
    }
    .pet-aura strong { color: var(--text); font-weight: 700; }
    .pet-num-label {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 18px; height: 18px; border-radius: 50%;
      background: #dc2626; color: #fff;
      font-size: 10px; font-weight: 700; line-height: 1;
      padding: 0 3px; flex-shrink: 0;
    }
    .aura-stage-badge {
      font-size: 9px; font-weight: 700; padding: 1px 5px;
      border-radius: 4px; white-space: nowrap;
    }

    .active-badge {
      display: flex; align-items: center; gap: 5px;
      font-size: 11px; font-weight: 700; color: #fff;
      background: var(--primary); border: 1.5px solid var(--primary);
      border-radius: 20px; padding: 3px 10px 3px 5px;
      white-space: nowrap;
    }
    .set-active-btn {
      width: 100%; padding: 5px 8px 5px 5px;
      display: flex; align-items: center; justify-content: center; gap: 5px;
      border: 1px solid var(--primary); border-radius: 8px;
      background: transparent; color: var(--primary);
      font-size: 11px; font-weight: 700; cursor: pointer;
      font-family: 'Noto Sans TC', sans-serif;
      transition: background 0.12s;
      touch-action: manipulation;
    }
    .set-active-btn:active { background: var(--pri-bg); }
    .set-active-btn:disabled { opacity: 0.4; cursor: default; }

    /* ── UNKNOWN CARD (未收集) ── */
    .pet-card.unknown {
      border-style: dashed; border-color: #c4b5fd;
      background: #faf5ff; cursor: default;
    }
    .unknown-q {
      font-size: 36px; color: #c4b5fd; font-weight: 700; line-height: 80px;
    }
    .unknown-text { font-size: 11px; color: #c4b5fd; font-weight: 500; }

    /* ── STAGE VIEW OVERLAY ── */
    .stage-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.55);
      display: flex; align-items: flex-end; justify-content: center;
      opacity: 0; pointer-events: none; visibility: hidden;
      transition: opacity 0.2s, visibility 0.2s;
    }
    .stage-overlay.open { opacity: 1; pointer-events: auto; visibility: visible; cursor: pointer; }
    .stage-overlay.open .stage-modal { cursor: default; }
    .stage-modal {
      width: 100%; max-width: 480px;
      background: var(--card);
      border-radius: 20px 20px 0 0;
      padding: 20px 16px 48px;
      transform: translateY(20px);
      transition: transform 0.2s;
    }
    .stage-overlay.open .stage-modal { transform: translateY(0); }
    .stage-modal-header {
      display: flex; align-items: center; justify-content: center;
      position: relative; margin-bottom: 18px;
    }
    .stage-modal-species {
      position: absolute; left: 36px;
      display: flex; align-items: center; gap: 4px;
      font-size: 13px; font-weight: 600; color: var(--subtext);
    }
    .stage-modal-title {
      display: flex; align-items: center; gap: 8px;
      font-size: 16px; font-weight: 700;
    }
    .stage-modal-expand {
      position: absolute; right: 0;
      width: 30px; height: 30px; border-radius: 50%;
      border: none; background: var(--bg); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--primary); touch-action: manipulation;
    }
    .stage-modal-close {
      position: absolute; left: 0;
      width: 30px; height: 30px; border-radius: 50%;
      border: none; background: var(--bg); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--subtext); font-size: 14px; touch-action: manipulation;
    }
    .stage-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
    }
    .stage-item {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
    }
    .stage-item-img {
      width: 68px; height: 68px;
      border-radius: 10px; overflow: hidden;
      background: #ece8f5;
      display: flex; align-items: center; justify-content: center;
      animation: imgPulse 1.6s ease-in-out infinite;
    }
    .stage-item-img.loaded { animation: none; }
    .stage-item-img img {
      width: 100%; height: 100%; object-fit: cover;
      -webkit-touch-callout: none; user-select: none; pointer-events: none;
    }
    .stage-item-q { font-size: 26px; color: #c4b5fd; }
    .stage-item.is-current .stage-item-img {
      border: 2.5px solid var(--primary);
      box-shadow: 0 0 10px rgba(124,58,237,0.3);
    }
    .stage-item.stage-locked .stage-item-img {
      background: #f3f2f7; animation: none;
    }
    .pet-img-wrap { cursor: pointer; }

    /* ── STAGE FULLSCREEN ── */
    .stage-fullscreen {
      position: fixed; inset: 0; z-index: 300;
      background: rgba(10,8,24,0.92);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s;
    }
    .stage-fullscreen.open { opacity: 1; pointer-events: auto; cursor: pointer; }
    .stage-fullscreen.open .stageFS-wrap { cursor: default; }
    .stageFS-wrap {
      width: 88%; max-width: 360px;
      display: flex; flex-direction: column; align-items: center; gap: 20px;
    }
    .stageFS-header {
      width: 100%; display: flex; align-items: center; justify-content: center;
      position: relative;
    }
    .stageFS-title {
      display: flex; align-items: center; gap: 8px;
      font-size: 16px; font-weight: 700; color: #fff;
    }
    .stageFS-close {
      position: absolute; right: 0;
      width: 30px; height: 30px; border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.1); color: #fff;
      font-size: 14px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      touch-action: manipulation;
    }
    .stageFS-body {
      width: 100%; display: flex; align-items: center; gap: 10px;
    }
    .stageFS-nav {
      flex-shrink: 0; width: 36px; height: 36px; border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.35);
      background: rgba(255,255,255,0.08); color: #fff;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      padding: 0; touch-action: manipulation;
    }
    .stageFS-nav[data-hidden] { visibility: hidden; pointer-events: none; }
    .stageFS-img-wrap {
      flex: 1; aspect-ratio: 1 / 1;
      border-radius: 18px; overflow: hidden;
      background: #1a1535;
      animation: imgPulse 1.6s ease-in-out infinite;
    }
    .stageFS-img-wrap.loaded { animation: none; }
    .stageFS-img-wrap img {
      width: 100%; height: 100%; object-fit: cover;
      pointer-events: none; user-select: none; -webkit-touch-callout: none;
    }

    /* ── ACTIVE PET BANNER ── */
    .active-pet-banner {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 14px;
      margin-bottom: 14px;
      font-size: 13px; color: var(--text);
      display: flex; align-items: center; gap: 5px;
      box-shadow: var(--shadow-sm);
      line-height: 1;
    }
    .banner-emoji {
      font-size: 16px; line-height: 1;
      display: inline-flex; align-items: center;
    }

    /* ── HELP BUTTON / OVERLAY ── */
    .help-btn {
      width: 24px; height: 24px; border-radius: 50%;
      background: var(--bg); border: 1.5px solid var(--subtext);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; color: var(--subtext);
      cursor: pointer; transition: all 0.15s;
      font-family: 'Noto Sans TC', sans-serif; flex-shrink: 0;
      touch-action: manipulation;
    }
    .help-btn:active { border-color: var(--primary); color: var(--primary); }

    /* ── UNLOCK SECTION ── */
    .unlock-section { margin-top: 6px; }

    .unlock-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 16px;
      padding: 18px 16px;
      display: flex; align-items: center; gap: 14px;
      box-shadow: var(--shadow-sm);
    }
    .unlock-card.locked { opacity: 0.65; }
    .unlock-card.unlockable {
      border-color: var(--primary);
      background: linear-gradient(135deg, #f5f3ff 0%, #ede9fe 100%);
      cursor: pointer;
      animation: glow 2.2s ease-in-out infinite;
    }
    .unlock-card.unlockable:active { opacity: 0.85; transform: scale(0.99); }
    @keyframes glow {
      0%, 100% { box-shadow: 0 4px 16px rgba(124,58,237,0.18); }
      50%       { box-shadow: 0 4px 28px rgba(124,58,237,0.38); }
    }

    .unlock-icon { font-size: 30px; flex-shrink: 0; }
    .unlock-info { flex: 1; min-width: 0; }
    .unlock-title {
      font-size: 15px; font-weight: 700; margin-bottom: 3px;
    }
    .unlock-card.unlockable .unlock-title { color: var(--primary); }
    .unlock-desc { font-size: 12px; color: var(--subtext); line-height: 1.5; }
    .unlock-arrow { font-size: 20px; color: var(--primary); flex-shrink: 0; }

    /* ── CONFIRM OVERLAY ── */
    .confirm-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 400; pointer-events: none;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; visibility: hidden;
      transition: opacity 0.2s, visibility 0.2s;
    }
    .confirm-overlay.open { opacity: 1; visibility: visible; pointer-events: auto; }
    .confirm-box {
      background: var(--card); border-radius: 16px;
      padding: 24px 20px 20px; width: 88%; max-width: 320px;
      transform: scale(0.94);
      transition: transform 0.2s cubic-bezier(0.32,0.72,0,1);
    }
    .confirm-overlay.open .confirm-box { transform: scale(1); }
    .confirm-title  { font-size: 16px; font-weight: 700; color: var(--primary); margin-bottom: 10px; }
    .confirm-desc   { font-size: 13px; color: var(--subtext); line-height: 1.65; margin-bottom: 20px; }
    .confirm-btns   { display: flex; gap: 10px; }
    .confirm-btn {
      flex: 1; padding: 12px 0; border-radius: 10px; border: none;
      font-size: 14px; font-weight: 700; cursor: pointer;
      font-family: 'Noto Sans TC', sans-serif;
      transition: opacity 0.15s;
    }
    .confirm-btn:active   { opacity: 0.75; }
    .confirm-btn:disabled { opacity: 0.4; cursor: default; }
    .confirm-btn.cancel { background: var(--bg); border: 1px solid var(--border); color: var(--text); }
    .confirm-btn.summon { background: var(--primary); color: #fff; }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 32px; left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: #1c1a2e; color: #fff;
      border-radius: 10px; padding: 10px 18px;
      font-size: 13px; white-space: nowrap;
      opacity: 0; transition: all 0.22s;
      z-index: 1000; pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.ok   { background: var(--success); }
    .toast.err  { background: var(--danger); }
  </style>
</head>
<body>

<header>
  <button class="back-btn" onclick="goBack()">&#8592;</button>
  <div class="header-info">
    <div class="header-title">我的星獸</div>
    <div class="header-sub" id="headerSub">載入中...</div>
  </div>
</header>

<main class="container">
  <div id="collectionContent">
    <div class="loading"><div class="spinner"></div></div>
  </div>
</main>

<!-- 進化階段面板 -->
<div class="stage-overlay" id="stageOverlay" onclick="stageOverlayTap(event)">
  <div class="stage-modal">
    <div class="stage-modal-header">
      <button class="stage-modal-close" onclick="closeStageView()">✕</button>
      <div class="stage-modal-title" id="stageModalTitle"></div>
      <button class="stage-modal-expand" onclick="openStageFullscreen()" title="放大檢視">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
          <path d="M1 5V1h4M9 1h4v4M1 9v4h4M9 13h4V9"/>
        </svg>
      </button>
    </div>
    <div class="stage-grid" id="stageGrid"></div>
  </div>
</div>

<!-- 進化階段全屏 -->
<div class="stage-fullscreen" id="stageFullscreen" onclick="if(event.target===this)closeStageFullscreen()">
  <div class="stageFS-wrap">
    <div class="stageFS-header">
      <div class="stageFS-title" id="stageFSTitle"></div>
      <button class="stageFS-close" onclick="closeStageFullscreen()">✕</button>
    </div>
    <div class="stageFS-body">
      <button class="stageFS-nav" id="stageFSPrev" onclick="navigateStageFS(-1)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div class="stageFS-img-wrap" id="stageFSImgWrap">
        <img id="stageFSImg" src="" decoding="async"
             onload="this.parentElement.classList.add('loaded')"
             onerror="this.parentElement.classList.add('loaded')"
             style="-webkit-touch-callout:default;pointer-events:auto">
      </div>
      <button class="stageFS-nav" id="stageFSNext" onclick="navigateStageFS(1)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>
    <span class="aura-stage-badge" id="stageFSBadge" style="font-size:12px;padding:3px 10px"></span>
  </div>
</div>

<!-- 解鎖確認 Dialog -->
<div class="confirm-overlay" id="unlockOverlay" onclick="if(event.target===this)closeUnlock()">
  <div class="confirm-box">
    <div class="confirm-title">✨ 召喚新星獸</div>
    <div class="confirm-desc">馬爾斯將為你召喚全新星獸，需要一點時間生成。確認後可回到聊天室，完成時會推播通知。</div>
    <div class="confirm-btns">
      <button class="confirm-btn cancel" onclick="closeUnlock()">取消</button>
      <button class="confirm-btn summon" id="summonBtn" onclick="confirmUnlock()">確認召喚</button>
    </div>
  </div>
</div>

<!-- 主獸說明 Dialog -->
<div id="petHelpOverlay" onclick="closePetHelp()"
     style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:400;align-items:center;justify-content:center;">
  <div onclick="event.stopPropagation()"
       style="background:#fff;border-radius:16px;padding:24px 20px;max-width:280px;width:90%;box-shadow:0 4px 24px rgba(0,0,0,0.18);">
    <div style="font-size:16px;font-weight:700;color:var(--primary);margin-bottom:12px;">✦ 主獸說明</div>
    <p style="font-size:14px;line-height:1.7;color:var(--text);margin-bottom:20px;text-align:justify;">主獸用於設定哪隻星獸將獲得靈氣加成，並在個人檔案中展示，在聊天室點擊圖文選單【召喚星獸】出來的也會是主獸。</p>
    <button onclick="closePetHelp()"
            style="background:var(--primary);color:#fff;border:none;border-radius:20px;padding:8px 28px;font-size:14px;font-weight:600;cursor:pointer;display:block;margin:0 auto;font-family:inherit;touch-action:manipulation;">確定</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script>
  const API     = 'https://mars-magicapp.com/webhook';
  const LIFF_ID = '2009047186-MXDITyXh';

  const SPECIES_ORDER = [
    { key: 'Dragon',  label: '龍',    emoji: '🐉' },
    { key: 'Phoenix', label: '鳳凰',  emoji: '🐦‍🔥' },
    { key: 'Fox',     label: '狐',    emoji: '🦊' },
    { key: 'Wolf',    label: '狼',    emoji: '🐺' },
    { key: 'Unicorn', label: '獨角獸', emoji: '🦄' },
    { key: 'Eagle',   label: '鷹',    emoji: '🦅' },
    { key: 'Tiger',   label: '虎',    emoji: '🐯' },
    { key: 'Ghost',   label: '幽靈',  emoji: '👻' },
  ];

  const STAGE_NAMES = { 1: '誕生', 2: '幼年', 3: '覺醒', 4: '星神' };

  let uid = '', group_id = '', group_name = '';
  let summoningNewPet = false;
  let pollTimer = null;
  let summonExpectedSlot = null;
  let loadingCollection = false;
  let petMap = {};
  let collectionData = null;
  let activeSlot = 1;
  let isTouching = false;
  let pendingRender = false;

  const _up = new URLSearchParams(location.search);
  group_id   = _up.get('group_id')   || '';
  group_name = _up.get('group_name') || '星際群組';

  async function init() {
    try {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) { liff.login(); return; }
      const p = await liff.getProfile();
      uid = p.userId;
    } catch {
      uid = _up.get('uid') || 'demo_user';
    }
    await loadCollection();
  }

  function startSummonPoll() {
    if (pollTimer) return;
    pollTimer = setInterval(loadCollection, 20000);
  }

  function stopSummonPoll() {
    clearInterval(pollTimer);
    pollTimer = null;
    summonExpectedSlot = null;
  }

  // 結構指紋：不含 aura_points，只有結構變動才重建 DOM
  function collectionFingerprint(d) {
    if (!d) return '';
    return (d.active_pet_slot || '') + '|' + (d.can_unlock_next ? 1 : 0) + '|' +
      (d.pets || []).map(p => `${p.pet_slot}:${p.pet_stage}`).join(',');
  }

  // 只更新靈氣值數字，不重建任何 DOM 節點
  function updateAuraOnly() {
    for (const pet of (collectionData.pets || [])) {
      const card = document.getElementById(`pc-${pet.pet_slot}`);
      if (!card) continue;
      const auraDiv = card.querySelector('.pet-aura');
      if (!auraDiv) continue;
      const stage = pet.pet_stage || 1;
      auraDiv.innerHTML = `<span class="aura-stage-badge stage-${stage}">${STAGE_NAMES[stage] || '誕生'}</span><strong>${Number(pet.aura_points).toLocaleString()}</strong>`;
    }
  }

  async function loadCollection() {
    if (loadingCollection) return;
    loadingCollection = true;
    try {
      const r = await fetch(`${API}/pet-collection`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ uid })
      });
      const newData = await r.json();
      if (!newData.success) throw new Error();

      const structureChanged = collectionFingerprint(newData) !== collectionFingerprint(collectionData);
      const oldData = collectionData;
      collectionData = newData;
      activeSlot = collectionData.active_pet_slot || 1;
      petMap = {};
      for (const pet of (collectionData.pets || [])) petMap[pet.pet_slot] = pet;

      if (structureChanged) {
        // 結構有變（新增星獸、進化、換主獸）→ 全量重建
        if (isTouching) {
          pendingRender = true;
        } else {
          renderCollection();
        }
      } else if (oldData) {
        // 只有靈氣值改變 → 局部更新數字，完全不破壞 DOM
        updateAuraOnly();
      }

      if (summonExpectedSlot) {
        if (petMap[summonExpectedSlot]) {
          stopSummonPoll();
          showToast('✨ 新星獸已召喚完成！', 'ok');
        } else if (!pollTimer) {
          startSummonPoll();
        }
      }
    } catch {
      document.getElementById('collectionContent').innerHTML =
        '<div style="padding:48px;text-align:center;color:var(--muted);font-size:14px">載入失敗，請關閉後重試</div>';
      document.getElementById('headerSub').textContent = '';
    } finally {
      loadingCollection = false;
    }
  }

  function petImageUrl(pet) {
    const raw = (pet.pet_gcs_path || '').replace(/\/?$/, '/');
    if (!raw || raw === '/') return null;
    return `${API}/get-signed-url?path=${encodeURIComponent(raw + 'stage_' + pet.pet_stage + '.png')}&v=${Math.floor(Date.now() / 1800000)}`;
  }

  let currentStageSlot = null;
  let currentStageCount = null;
  let stageFSIndex = 0;

  function openStageView(slot) {
    const pet = petMap[slot];
    if (!pet) return;

    const currentStage = pet.pet_stage || 1;
    // 同一隻且階段未變 → 不重建（避免重複載入圖片）；階段有變則重建
    if (currentStageSlot !== slot || currentStageCount !== currentStage) {
      currentStageSlot = slot;
      currentStageCount = currentStage;
      const gcsPath = (pet.pet_gcs_path || '').replace(/\/?$/, '/');
      const v = Math.floor(Date.now() / 1800000);
      let html = '';
      for (let s = 1; s <= 4; s++) {
        const reached = s <= currentStage;
        const isCurrent = s === currentStage;
        if (reached && gcsPath && gcsPath !== '/') {
          const imgUrl = `${API}/get-signed-url?path=${encodeURIComponent(gcsPath + 'stage_' + s + '.png')}&v=${v}`;
          html += `<div class="stage-item ${isCurrent ? 'is-current' : ''}">
            <div class="stage-item-img">
              <img src="${imgUrl}" loading="lazy" decoding="async"
                onload="this.parentElement.classList.add('loaded')"
                onerror="this.parentElement.classList.add('loaded');this.outerHTML='<span class=stage-item-q>?</span>'">
            </div>
            <span class="aura-stage-badge stage-${s}">${STAGE_NAMES[s]}</span>
          </div>`;
        } else {
          html += `<div class="stage-item stage-locked">
            <div class="stage-item-img loaded"><span class="stage-item-q">?</span></div>
            <span class="aura-stage-badge stage-${s}">${STAGE_NAMES[s]}</span>
          </div>`;
        }
      }
      document.getElementById('stageGrid').innerHTML = html;
    }

    const spInfo = SPECIES_ORDER.find(s => s.key === pet.pet_species) || {};
    document.getElementById('stageModalTitle').innerHTML =
      `<div class="stage-modal-species"><span style="font-size:16px">${spInfo.emoji || ''}</span><span>${spInfo.label || ''}</span></div><span class="pet-num-label">${slot}</span><span style="margin:0 6px;color:var(--subtext);font-weight:400">—</span>進化歷程`;
    const overlay = document.getElementById('stageOverlay');
    overlay._openedAt = Date.now();
    overlay.classList.add('open');
  }

  function closeStageView() {
    document.getElementById('stageOverlay').classList.remove('open');
  }

  function openStageFullscreen() {
    const pet = petMap[currentStageSlot];
    if (!pet) return;
    stageFSIndex = (pet.pet_stage || 1) - 1; // 預設從當前階段開始
    renderStageFullscreen();
    document.getElementById('stageFullscreen').classList.add('open');
  }

  function closeStageFullscreen() {
    document.getElementById('stageFullscreen').classList.remove('open');
  }

  function navigateStageFS(dir) {
    const pet = petMap[currentStageSlot];
    if (!pet) return;
    const maxIndex = (pet.pet_stage || 1) - 1;
    stageFSIndex = Math.max(0, Math.min(maxIndex, stageFSIndex + dir));
    renderStageFullscreen();
  }

  function renderStageFullscreen() {
    const pet = petMap[currentStageSlot];
    if (!pet) return;
    const stage = stageFSIndex + 1;
    const maxStage = pet.pet_stage || 1;
    const gcsPath = (pet.pet_gcs_path || '').replace(/\/?$/, '/');
    const imgUrl = `${API}/get-signed-url?path=${encodeURIComponent(gcsPath + 'stage_' + stage + '.png')}&v=${Math.floor(Date.now() / 1800000)}`;

    const spInfo = SPECIES_ORDER.find(s => s.key === pet.pet_species) || {};
    document.getElementById('stageFSTitle').innerHTML =
      `<span class="pet-num-label">${currentStageSlot}</span><span style="color:#fff;font-weight:600;margin-left:6px">${spInfo.label || ''}(${spInfo.key || ''})</span>`;

    const badge = document.getElementById('stageFSBadge');
    badge.className = `aura-stage-badge stage-${stage}`;
    badge.textContent = STAGE_NAMES[stage];

    const wrap = document.getElementById('stageFSImgWrap');
    wrap.classList.remove('loaded');
    document.getElementById('stageFSImg').src = imgUrl;

    const prev = document.getElementById('stageFSPrev');
    const next = document.getElementById('stageFSNext');
    stageFSIndex > 0 ? prev.removeAttribute('data-hidden') : prev.setAttribute('data-hidden', '');
    stageFSIndex < maxStage - 1 ? next.removeAttribute('data-hidden') : next.setAttribute('data-hidden', '');
  }

  function renderCollection() {
    const pets = collectionData.pets || [];
    petMap = {};

    // 先建立 petMap 以便橫幅能查到物種
    for (const pet of pets) petMap[pet.pet_slot] = pet;

    const activePet = petMap[activeSlot];
    const activeSpInfo = activePet ? (SPECIES_ORDER.find(s => s.key === activePet.pet_species) || {}) : {};
    let html = `<div class="active-pet-banner" id="activePetBanner"><span>目前主獸為第</span><span class="pet-num-label">${activeSlot}</span><span>隻，種類為</span><span class="banner-emoji">${activeSpInfo.emoji || ''}</span><button class="help-btn" onclick="openPetHelp()" style="margin-left:auto">？</button></div>`;

    for (const sp of SPECIES_ORDER) {
      const spPets = pets.filter(p => p.pet_species === sp.key);
      let cardsHTML = '';

      let rowHTML = '';

      if (spPets.length === 0) {
        cardsHTML = `
          <div class="pet-card unknown">
            <div class="pet-img-wrap">
              <span class="unknown-q">?</span>
            </div>
            <div class="unknown-text">尚未收集</div>
          </div>`;
        rowHTML = `<div class="pet-row">${cardsHTML}</div>`;
      } else {
        const useScroll = spPets.length > 3;
        const cardsArr = [];
        for (const pet of spPets) {
          const imgUrl  = petImageUrl(pet);
          const isActive = pet.pet_slot === activeSlot;
          const stage   = pet.pet_stage || 1;
          const imgTag  = imgUrl
            ? `<img src="${imgUrl}" alt="${sp.label}" loading="lazy" decoding="async"
                 onload="this.parentElement.classList.remove('is-loading');this.parentElement.classList.add('loaded')"
                 onerror="this.parentElement.classList.remove('is-loading');this.parentElement.classList.add('loaded');this.outerHTML='<div class=\\'pet-img-placeholder\\'>${sp.emoji}</div>'">`
            : `<div class="pet-img-placeholder">${sp.emoji}</div>`;
          const numBadge = `<span class="pet-num-label">${pet.pet_slot}</span>`;
          const imgWrap = `<div class="pet-img-wrap${imgUrl ? ' is-loading' : ''}" onclick="openStageView(${pet.pet_slot})">${imgTag}</div>`;
          const actionHTML = isActive
            ? `<div class="active-badge">${numBadge} ✦ 主獸</div>`
            : `<button class="set-active-btn" onclick="setActive(${pet.pet_slot})">${numBadge} 設為主獸</button>`;

          cardsArr.push(`
            <div class="pet-card ${isActive ? 'is-active' : ''}" id="pc-${pet.pet_slot}">
              ${imgWrap}
              <div class="pet-aura">
                <span class="aura-stage-badge stage-${stage}">${STAGE_NAMES[stage] || '誕生'}</span>
                <strong>${Number(pet.aura_points).toLocaleString()}</strong>
              </div>
              ${actionHTML}
            </div>`);
        }

        if (!useScroll) {
          rowHTML = `<div class="pet-row">${cardsArr.join('')}</div>`;
        } else {
          let pagesHTML = '';
          for (let i = 0; i < cardsArr.length; i += 3) {
            pagesHTML += `<div class="pet-scroll-page">${cardsArr.slice(i, i + 3).join('')}</div>`;
          }
          rowHTML = `<div class="pet-scroll-row">${pagesHTML}</div>`;
        }
      }

      const countBadge = spPets.length > 0
        ? `<span class="species-count">${spPets.length} 隻</span>` : '';

      html += `
        <div class="species-section">
          <div class="species-header">
            <span class="species-emoji">${sp.emoji}</span>
            <span class="species-name">${sp.label}</span>
            ${countBadge}
          </div>
          ${rowHTML}
        </div>`;
    }

    // 解鎖區塊
    const nextSlot  = collectionData.next_slot || (pets.length + 1);
    const canUnlock = collectionData.can_unlock_next;
    html += `
      <div class="unlock-section">
        <div class="unlock-card ${canUnlock ? 'unlockable' : 'locked'}"
             ${canUnlock ? 'onclick="openUnlock()"' : ''}>
          <div class="unlock-icon">${canUnlock ? '✨' : '🔒'}</div>
          <div class="unlock-info">
            <div class="unlock-title">${canUnlock ? '召喚新星獸' : `第 ${nextSlot} 隻星獸`}</div>
            <div class="unlock-desc">${canUnlock
              ? `點此召喚你的第 ${nextSlot} 隻星獸！`
              : `需要第 ${nextSlot - 1} 隻達到滿階（星神）才可解鎖`}</div>
          </div>
          ${canUnlock ? '<div class="unlock-arrow">›</div>' : ''}
        </div>
      </div>`;

    document.getElementById('headerSub').textContent = `共 ${pets.length} 隻`;
    document.getElementById('collectionContent').innerHTML = html;
  }

  async function setActive(slot) {
    // 先立即 disable 按鈕（API 回傳前的視覺回饋）
    const initCard = document.getElementById(`pc-${slot}`);
    const initBtn  = initCard ? initCard.querySelector('.set-active-btn') : null;
    if (initBtn) {
      initBtn.disabled = true;
      initBtn.innerHTML = `<span class="pet-num-label">${slot}</span> 設定中...`;
    }

    try {
      const r = await fetch(`${API}/set-active-pet`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ uid, pet_slot: slot })
      });
      const d = await r.json();
      if (!d.success) throw new Error(d.message || '設定失敗');

      // await 後重新查詢 DOM（polling 可能已重建畫面）
      const oldSlot = activeSlot;
      if (oldSlot !== slot) {
        const oldCard = document.getElementById(`pc-${oldSlot}`);
        if (oldCard) {
          oldCard.classList.remove('is-active');
          const oldBadge = oldCard.querySelector('.active-badge');
          if (oldBadge) {
            const newBtn = document.createElement('button');
            newBtn.className = 'set-active-btn';
            newBtn.type = 'button';
            newBtn.setAttribute('onclick', `setActive(${oldSlot})`);
            newBtn.innerHTML = `<span class="pet-num-label">${oldSlot}</span> 設為主獸`;
            oldBadge.replaceWith(newBtn);
          }
        }
      }

      activeSlot = slot;
      collectionData.active_pet_slot = slot;

      const newCard = document.getElementById(`pc-${slot}`); // 重新查詢
      if (newCard) {
        newCard.classList.add('is-active');
        const actionBtn = newCard.querySelector('.set-active-btn');
        if (actionBtn) {
          const newBadge = document.createElement('div');
          newBadge.className = 'active-badge';
          newBadge.innerHTML = `<span class="pet-num-label">${slot}</span> ✦ 主獸`;
          actionBtn.replaceWith(newBadge);
        }
      }

      updateActiveBanner(slot);
      showToast('主獸已更新！', 'ok');
    } catch(e) {
      // 重新查詢按鈕（DOM 可能已重建）
      const curCard = document.getElementById(`pc-${slot}`);
      const curBtn  = curCard ? curCard.querySelector('.set-active-btn') : null;
      if (curBtn) {
        curBtn.disabled = false;
        curBtn.innerHTML = `<span class="pet-num-label">${slot}</span> 設為主獸`;
      }
      showToast(e.message || '設定失敗，請重試', 'err');
    }
  }

  function openPetHelp()  { const el = document.getElementById('petHelpOverlay'); el.style.display = 'flex'; }
  function closePetHelp() { document.getElementById('petHelpOverlay').style.display = 'none'; }

  function openUnlock() {
    const btn = document.getElementById('summonBtn');
    btn.disabled = false;
    btn.textContent = '確認召喚';
    document.getElementById('unlockOverlay').classList.add('open');
  }
  function closeUnlock() {
    document.getElementById('unlockOverlay').classList.remove('open');
  }

  async function confirmUnlock() {
    const btn = document.getElementById('summonBtn');
    btn.disabled = true; btn.textContent = '召喚中...';

    try {
      const r = await fetch(`${API}/unlock-new-pet`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ uid })
      });
      const d = await r.json();
      if (!d.success) throw new Error(d.message);

      closeUnlock();
      showToast('召喚已啟動！完成後將推播通知', 'ok');

      summoningNewPet = true;
      summonExpectedSlot = collectionData.next_slot;
      startSummonPoll();

      // 將解鎖按鈕改成「召喚中」狀態
      setTimeout(() => {
        const card = document.querySelector('.unlock-card.unlockable');
        if (!card) return;
        card.classList.replace('unlockable', 'locked');
        card.removeAttribute('onclick');
        card.querySelector('.unlock-icon').textContent = '⏳';
        card.querySelector('.unlock-title').textContent = '召喚中...';
        card.querySelector('.unlock-desc').textContent = '完成後推播通知，回到此頁面將自動更新';
        const arrow = card.querySelector('.unlock-arrow');
        if (arrow) arrow.remove();
      }, 300);
    } catch (e) {
      btn.disabled = false; btn.textContent = '確認召喚';
      showToast(e.message || '召喚失敗，請重試', 'err');
    }
  }

  function goBack() {
    if (group_id) {
      const p = new URLSearchParams({ group_id, uid, group_name });
      location.href = `group_room.html?${p}`;
    } else {
      location.href = 'group_home.html';
    }
  }

  function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${type} show`;
    setTimeout(() => { t.className = 'toast'; }, 2500);
  }

  function updateActiveBanner(slot) {
    const banner = document.getElementById('activePetBanner');
    if (!banner) return;
    const pet = petMap[slot];
    const spInfo = pet ? (SPECIES_ORDER.find(s => s.key === pet.pet_species) || {}) : {};
    banner.innerHTML = `<span>目前主獸為第</span><span class="pet-num-label">${slot}</span><span>隻，種類為</span><span class="banner-emoji">${spInfo.emoji || ''}</span><button class="help-btn" onclick="openPetHelp()" style="margin-left:auto">？</button>`;
  }

  // Stage overlay: close on backdrop tap via onclick attribute (reliable on iOS Safari)
  function stageOverlayTap(e) {
    if (e.target.closest('.stage-modal')) return;
    const ov = document.getElementById('stageOverlay');
    if (Date.now() - (ov._openedAt || 0) < 200) return;
    closeStageView();
  }

  document.addEventListener('touchstart', () => { isTouching = true; }, { passive: true });

  document.addEventListener('touchend', () => {
    isTouching = false;
    if (pendingRender) { pendingRender = false; setTimeout(renderCollection, 0); }
  }, { passive: true });

  document.addEventListener('touchcancel', () => {
    isTouching = false;
    if (pendingRender) { pendingRender = false; setTimeout(renderCollection, 0); }
  }, { passive: true });

  document.addEventListener('contextmenu', e => {
    if (e.target.tagName === 'IMG' && e.target.id !== 'stageFSImg') e.preventDefault();
  });

  document.addEventListener('visibilitychange', () => {
    if (document.hidden) {
      clearInterval(pollTimer);
      pollTimer = null;
    } else {
      summoningNewPet = false;
      loadCollection();
    }
  });

  init();
</script>
</body>
</html>
